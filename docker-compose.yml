version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ragent-backend
    ports:
      - "8000:8000"
    environment:
      - RAGENT_DEMO_MODE=true
      - RAGENT_DATABASE_URL=sqlite:///./ragent_router.db
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragent-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    restart: unless-stopped

volumes:
  backend_data:
